[project]
name = "sherry-agent"
version = "0.1.0"
description = "基于 Claude Code 与 OpenClaw 两大 AI Agent 框架优势融合的 Python 多 Agent 框架"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "SherryAgent Team" }
]
keywords = ["ai", "agent", "llm", "claude", "openai"]

dependencies = [
    "anthropic>=0.40",
    "openai>=1.50",
    "textual>=3.0",
    "click>=8.1",
    "aiosqlite>=0.20",
    "apscheduler>=3.10",
    "pydantic>=2.10",
    "pydantic-settings>=2.6",
    "structlog>=24.0",
    "pluggy>=1.5",
    "fastapi>=0.115",
    "websockets>=13.0",
    "sentence-transformers>=3.0",
    "aiohttp>=3.10",
    "mypy>=1.20.0",
    "ruff>=0.15.9",
    "toml>=0.10.2",
    "pexpect>=4.9.0",
    "datasets>=4.8.4",
    "tiktoken>=0.7.0",
    "psutil>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "mypy>=1.11",
    "ruff>=0.6",
]

[project.scripts]
sherry-agent = "sherry_agent.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sherry_agent"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
]
ignore = [
    "E501",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: Mark integration tests",
    "ollama: Mark Ollama-related tests",
    "security: Mark security-related tests",
    "e2e: Mark end-to-end tests",
    "slow: Mark slow-running tests",
    "tools: Mark tool-related tests",
]

[tool.coverage.run]
source = ["src/sherry_agent"]
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 2
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "@abstractmethod",
    "raise NotImplementedError",
]

[tool.coverage.html]
directory = "htmlcov"
title = "SherryAgent Test Coverage"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]

